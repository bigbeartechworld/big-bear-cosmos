cosmos-installer: null
# Configuration for playitgg setup

# Name of the big-bear-playitgg application
# Service definitions for the big-bear-playitgg application
services:
  # Service name: app
  # The `app` service definition
  app:
    # Name of the container
    container_name: playitgg
    # Image to be used for the container
    image: dysta/playitgg:1.2.0@sha256:d26d21c5fca76253dbc45715f1556cdc29945648a11e0f63b01fb6a1c9b4a96a
    # Container restart policy
    restart: unless-stopped
    # Volumes to be mounted to the container
    volumes:
      # Mounting the local playitgg directory to /secrets inside the container
      - big-bear-playitgg_secrets:/secrets
volumes:
  big-bear-playitgg_secrets:
    name: big-bear-playitgg_secrets
    driver: local
minVersion: 0.14.0
