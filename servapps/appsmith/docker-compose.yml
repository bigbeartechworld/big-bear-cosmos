cosmos-installer: null
# Configuration for appsmith setup

# Name of the big-bear-appsmith application
# Service definitions for the big-bear-appsmith application
services:
  # Service name: app
  # The `app` service definition
  app:
    image: appsmith/appsmith-ce:v1.98.1@sha256:9a5119fdbf22c5ae25c2240a5d5f944b9c44c4fe4a6cfa65934dc3792d24c871 # Docker image to use
    container_name: appsmith # Name of the container
    ports:
      - "1080:80" # Port mapping host:container for HTTP
      - "10443:443" # Port mapping host:container for HTTPS
    volumes:
      - big-bear-appsmith_stacks:/appsmith-stacks # Mount volume for app data
    restart: unless-stopped # Container restart policy
volumes:
  big-bear-appsmith_stacks:
    name: big-bear-appsmith_stacks
    driver: local
minVersion: 0.14.0
