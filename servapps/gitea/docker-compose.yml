cosmos-installer: null
services:
  big-bear-gitea:
    container_name: big-bear-gitea
    image: gitea/gitea:1.26.4@sha256:8e25c717b8f748445e15ec46e0390f577cb628101184cb0a150d1dae126c1f39
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - big-bear-gitea_data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__server__SSH_PORT=2222
      # - GITEA__server__DOMAIN=git.example.com
      # - GITEA__server__ROOT_URL=https://git.example.com/
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=3", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
volumes:
  big-bear-gitea_data:
    name: big-bear-gitea_data
    driver: local
minVersion: 0.14.0
