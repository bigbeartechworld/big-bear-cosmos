cosmos-installer: null
# Configuration for lancache setup

# Name of the big-bear-lancache application
# Service definitions for the big-bear-lancache application
services:
  # Service name: app
  app:
    image: lancachenet/monolithic:latest@sha256:a5f93cef3a4c48c63e9f09883ac7a3961621db56974427110d9aeb4f36af9360 # Docker image for the caching service
    environment:
      # Toggle for load balancer usage or separate IPs for each service
      - USE_GENERIC_CACHE=true
      # IPs for lancache monolithic instance; affects DNS resolution
      - LANCACHE_IP=10.0.39.1
      # Host IP for the DNS server binding
      - DNS_BIND_IP=10.0.39.1
      # Upstream DNS for forwarded lookups
      - UPSTREAM_DNS=8.8.8.8
      # Local storage path for cache data
      - CACHE_ROOT=./lancache
      # Customizable disk cache size
      - CACHE_DISK_SIZE=2000g
      # Memory allocation for nginx cache indexing
      - CACHE_INDEX_SIZE=500m
      # Maximum age for cached content
      - CACHE_MAX_AGE=3650d
      # Container timezone setting for log timestamps
      - TZ=UTC
    restart: unless-stopped
    ports:
      - 8080:80
      - 10443:443
    volumes:
      # Mount points for cache and logs
      - big-bear-lancache_cache:/data/cache
      - big-bear-lancache_logs:/data/logs
  # DNS service configuration
  dns:
    image: lancachenet/lancache-dns:latest@sha256:3f37998a643435c2a9d1226a64ff13ea073f588031f6e3a92648b80d8281f20f # Docker image for DNS service
    environment:
      # Toggle for load balancer usage or separate IPs for each service
      - USE_GENERIC_CACHE=true
      # IPs for lancache monolithic instance; affects DNS resolution
      - LANCACHE_IP=10.0.39.1
      # Host IP for the DNS server binding
      - DNS_BIND_IP=10.0.39.1
      # Upstream DNS for forwarded lookups
      - UPSTREAM_DNS=8.8.8.8
      # Local storage path for cache data
      - CACHE_ROOT=./lancache
      # Customizable disk cache size
      - CACHE_DISK_SIZE=2000g
      # Memory allocation for nginx cache indexing
      - CACHE_INDEX_SIZE=500m
      # Maximum age for cached content
      - CACHE_MAX_AGE=3650d
      # Container timezone setting for log timestamps
      - TZ=UTC
    restart: unless-stopped
    ports:
      - 53:53/udp
      - 53:53/tcp
volumes:
  big-bear-lancache_cache:
    name: big-bear-lancache_cache
    driver: local
  big-bear-lancache_logs:
    name: big-bear-lancache_logs
    driver: local
minVersion: 0.14.0
